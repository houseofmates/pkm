<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: "Varela Round", "Segoe UI", sans-serif;
            width: 320px;
            padding: 16px;
            background-color: #050505;
            color: #fff;
        }

        h3 {
            margin-top: 0;
            color: #f6b012;
            text-transform: lowercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-icon {
            cursor: pointer;
            opacity: 0.5;
            font-size: 10px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: #888;
            text-transform: lowercase;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            margin-bottom: 12px;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #f6b012;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #f6b012;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-transform: lowercase;
        }

        button:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <h3>
        <span>pkm capture</span>
        <span id="toggle-settings" class="settings-icon">⚙</span>
    </h3>

    <!-- Capture Form -->
    <div id="capture-view">
        <label>Title</label>
        <input type="text" id="title" placeholder="page title">

        <label>URL</label>
        <input type="text" id="url" placeholder="https://...">

        <label>Note / Selection</label>
        <textarea id="content" rows="4" placeholder="captured text..."></textarea>

        <button id="save-capture">save to brain</button>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="hidden">
        <label>NocoBase API Token</label>
        <input type="text" id="token" placeholder="paste_key_here...">
        <button id="save-token">save connection</button>
        <button id="cancel-settings" style="background: transparent; color: #888; margin-top: 8px;">cancel</button>
    </div>

    <div id="status" style="margin-top: 10px; text-align: center; color: #4ade80; opacity: 0; font-size: 12px;">saved
    </div>

    <script src="popup.js"></script>
</body>

</html>
