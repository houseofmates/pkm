<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PKM Capture Settings</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            width: 400px;
            background-color: #000;
            color: #fff;
        }
        h2 {
            color: #f6b012; /* PKM Yellow */
            font-weight: normal;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #f6b012;
        }
        button {
            background-color: #f6b012;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        .status {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <h2>PKM Capture Settings</h2>
    
    <label for="token">NocoBase API Token</label>
    <input type="text" id="token" placeholder="PLACEHOLDER_KEY">
    
    <button id="save">Save Settings</button>
    <div id="status" class="status">Saved!</div>

    <script src="options.js"></script>
</body>
</html>
