services:
  # frontend (pkm)  pkm-frontend:
    image: nginx:alpine
    container_name: pkm-frontend
    restart: always
    ports:
      - "3010:3000"
    volumes:
      # app files (includes breathe page)      - ./dist:/usr/share/nginx/html:ro
      # custom nginx config with /breathe route      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - main-stack_frontend

networks:
  main-stack_frontend:
    external: true
