<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <base href="/" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />



  <!-- Critical CSS to prevent FOUC - loaded immediately -->
  <style>
    /* Reset and base styles */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Varela Round', sans-serif;
      background-color: #050505; /* full-viewport void background */
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Hide all content until React loads */
    #root {
      min-height: 100vh;
      background-color: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Simple circular spinner (yellow) */
    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.06);
      border-top-color: #f6b012; /* yellow accent */
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <title>pkm</title>
</head>

<body class="fonts-loading">
  <div id="root">
    <div class="loading">
      <!-- Simple circular spinner, no text -->
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    // Font loading detection
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        document.body.classList.remove('fonts-loading');
        document.body.classList.add('fonts-loaded');
      });
    }

    // Prevent layout shift
    document.documentElement.style.visibility = 'visible';
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
