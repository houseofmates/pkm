server {
    listen 3000;
    server_name localhost;
    
    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: ws: wss:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Root directory
    root /usr/share/nginx/html;
    index index.html;
    
    # Static /breathe path - MUST come before the SPA catch-all
    location = /breathe {
        return 301 /breathe/;
    }
    
    location /breathe/ {
        alias /usr/share/nginx/html/breathe/;
        index index.html;
        try_files $uri $uri/ =404;
        
        # versioned caching for static assets
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Static assets
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # pkm wiki - MUST come before the SPA catch-all
    location = /pkm {
        return 301 /pkm/;
    }

    location /pkm/ {
        alias /var/www/pkm/;
        index index.html;
        try_files $uri $uri/ /pkm/index.html;

        # versioned caching for wiki static assets
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # SPA routing for all other paths - catch-all last
    location / {
        try_files $uri $uri/ /index.html;
        
        # no caching for html files
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
