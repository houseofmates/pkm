server {
    listen 3000;
    server_name localhost;
    
    # Root directory
    root /usr/share/nginx/html;
    index index.html;
    
    # Static /breathe path - MUST come before the SPA catch-all
    location = /breathe {
        return 301 /breathe/;
    }
    
    location /breathe/ {
        alias /usr/share/nginx/html/breathe/;
        index index.html;
        try_files $uri $uri/ =404;
        
        # Disable caching for development
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # Static assets
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # pkm wiki - MUST come before the SPA catch-all
    location = /pkm {
        return 301 /pkm/;
    }

    location /pkm/ {
        alias /var/www/pkm/;
        index index.html;
        try_files $uri $uri/ /pkm/index.html;

        # Disable caching for development
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # SPA routing for all other paths - catch-all last
    location / {
        try_files $uri $uri/ /index.html;
    }
}

