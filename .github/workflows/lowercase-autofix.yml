name: lowercase autofix

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  autofix:
    name: autofix lowercase violations
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install
        run: npm ci --legacy-peer-deps

      - name: apply comment lowercase autofix
        run: npm run lowercase:fix || true

      - name: apply ui-lowercase autofix
        run: node scripts/check-ui-lowercase.cjs --apply || true

      - name: detect changes
        id: detect
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "files=" >> $GITHUB_OUTPUT
            exit 0
          fi
          files=$(git --no-pager diff --name-only HEAD)
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: commit & push fixes to PR branch (if available)
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: lowercase autofix (ci)" || echo "nothing to commit"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: create autofix branch & PR (forks / non-writable head)
        if: steps.detect.outputs.changed == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          BRANCH=autofix/lowercase-${{ github.run_id }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          git add -A
          git commit -m "chore: lowercase autofix (ci)" || echo "nothing to commit"
          git push --set-upstream origin $BRANCH

      - name: create pull request for autofix branch
        if: steps.detect.outputs.changed == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository)
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore: lowercase autofix (ci)
          branch: autofix/lowercase-${{ github.run_id }}
          title: chore: lowercase autofix (ci)
          body: |
            automated lowercase autofix applied by CI.

      - name: comment on PR with summary
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const files = `
${{ steps.detect.outputs.files }}
`.trim();
            const pr = context.payload.pull_request.number
            const body = `✅ automated lowercase autofix applied by CI.\n\nchanged files:\n\n${files.split('\n').map(f=>`- ${f}`).join('\n')}`
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, body })

      - name: success
        if: steps.detect.outputs.changed != 'true'
        run: echo "no autofix changes required"
